name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  release:
    name: Prepare release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update manifest version
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          sed -i "s/\"version\": \".*\"/\"version\": \"${VERSION}\"/" \
            custom_components/heating_controller/manifest.json

      - name: Create release zip
        run: |
          cd custom_components/heating_controller
          zip -r ../../heating_controller.zip .

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: heating_controller.zip
